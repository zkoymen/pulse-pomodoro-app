<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav">
      <div class="logo">Pulse</div>
      <button id="tab-timer" class="nav-btn active">Timer</button>
      <button id="tab-history" class="nav-btn">History</button>
    </aside>

    <main class="content">
      <section id="timer-page" class="page active">
        <div class="hero-card">
          <div class="doodle doodle-top" aria-hidden="true"></div>
          <svg class="pixel-sticker tomato" viewBox="0 0 48 48" aria-hidden="true">
            <rect x="13" y="13" width="22" height="22" rx="5" />
            <rect x="19" y="8" width="10" height="8" rx="2" />
          </svg>
          <div>
            <h1>Pomodoro</h1>
            <p>Sade, hızlı, kalıcı geçmişli.</p>
          </div>
          <svg class="leaf-doodle" viewBox="0 0 120 80" aria-hidden="true">
            <path d="M8 50 C30 12, 62 12, 98 44" />
            <path d="M28 57 C42 35, 70 34, 108 58" />
            <circle cx="96" cy="42" r="4" />
          </svg>
          <div class="dot"></div>
        </div>

        <div class="timer-card">
          <div class="doodle doodle-card" aria-hidden="true"></div>
          <svg class="pixel-sticker spark" viewBox="0 0 56 56" aria-hidden="true">
            <path d="M28 6 L33 23 L50 28 L33 33 L28 50 L23 33 L6 28 L23 23 Z" />
          </svg>
          <div class="field-row">
            <label>Çalışma (dk)</label>
            <div class="adjuster">
              <button id="focus-minus">-</button>
              <input id="focus-input" type="number" min="1" max="180" value="25" />
              <button id="focus-plus">+</button>
            </div>
          </div>

          <div class="field-row">
            <label>Mola (dk)</label>
            <div class="adjuster">
              <button id="break-minus">-</button>
              <input id="break-input" type="number" min="1" max="90" value="5" />
              <button id="break-plus">+</button>
            </div>
          </div>

          <div class="mode-switch" role="group" aria-label="Mode switch">
            <button id="mode-focus" class="mode-btn active" type="button">Focus</button>
            <button id="mode-break" class="mode-btn" type="button">Break</button>
          </div>

          <div id="time-display" class="time-display">25:00</div>

          <div class="progress-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>

          <div class="controls">
            <button id="start-pause" class="primary">Başlat</button>
            <button id="reset-btn" class="ghost">Sıfırla</button>
          </div>

          <div class="note-wrap">
            <label for="note-input">Not (opsiyonel)</label>
            <div class="note-row">
              <textarea id="note-input" maxlength="700" placeholder="Notunu yaz. Shift+Enter ile alt satir, Enter ile kaydet."></textarea>
              <button id="note-edit-btn" class="ghost note-edit" type="button">Edit</button>
            </div>
            <p id="note-status" class="note-status">Enter ile notu tamamla.</p>
          </div>

          <p class="small">Focus bitince seans geçmişe kaydedilir.</p>
        </div>
      </section>

      <section id="history-page" class="page">
        <div class="history-header">
          <h2>Geçmiş Seanslar</h2>
          <button id="refresh-history" class="ghost">Yenile</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
